name: Build Fenix plugin

on:
  push:
    branches: [main, master]
    paths:
      - 'projects/**'
      - 'package.json'
      - 'angular.json'
      - 'tsconfig.json'
      - 'gulpfile.js'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Commit dist/ back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet || git commit -m "chore: build dist [skip ci]"
          git push
